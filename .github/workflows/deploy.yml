name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Docker login and push
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aiva-backend:latest,${{ secrets.DOCKER_USERNAME }}/aiva-backend:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aiva-web:latest,${{ secrets.DOCKER_USERNAME }}/aiva-web:${{ github.sha }}

      # Kubernetes deployment
      - name: Deploy to Kubernetes
        uses: Azure/k8s-deploy@v4
        with:
          manifests: |
            infrastructure/k8s/deployment.yaml
          images: |
            ${{ secrets.DOCKER_USERNAME }}/aiva-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/aiva-web:${{ github.sha }}
